<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Тест WebSockets</title>
    <script src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/stomp.js/2.3.3/stomp.min.js"></script>
</head>
<body>
    <h2>Данные с ESP8266 в реальном времени:</h2>
    <div id="messages" style="background: #222; color: #0f0; padding: 10px; font-family: monospace;">
        Подключаемся к серверу...
    </div>

    <script>
        // 1. Указываем адрес твоего вебсокета
        let socket = new SockJS('http://localhost:8080/ws-sensor');
        let stompClient = Stomp.over(socket);

        // 2. Подключаемся
        stompClient.connect({}, function (frame) {
            document.getElementById('messages').innerText = "Подключено! Ждем данные...";
            
            // 3. Слушаем канал /topic/sensor
            stompClient.subscribe('/topic/sensor', function (response) {
                let data = JSON.parse(response.body);
                // Как только прилетают данные, выводим их на экран
                document.getElementById('messages').innerText = 
                    "Температура: " + data.temperature + "°C | Влажность: " + data.humidity + "%";
            });
        });
    </script>
</body>
</html>
